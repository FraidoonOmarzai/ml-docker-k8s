# ─────────────────────────────────────────────────────────────────────────────
# hpa.yaml — Horizontal Pod Autoscaler
#
# Automatically scales pod count based on CPU utilization.
# Works in tandem with the resource requests in deployment.yaml —
# the HPA calculates usage as a % of the request value.
#
# Requires metrics-server to be installed:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dock8s-api-hpa
  namespace: dock8s-namespace
  labels:
    app: dock8s-api
    app.kubernetes.io/name: dock8s-api
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dock8s-api

  # ── Replica bounds ─────────────────────────────────────────────────────────
  minReplicas: 2 # never go below 2 (HA guarantee)
  maxReplicas: 6 # never exceed 6 (cost cap)

  # ── Scaling metrics ────────────────────────────────────────────────────────
  # ── Metrics (CPU ONLY for stability) ───────────────────────
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65 # slightly lower → reacts faster

  # ── Scaling behaviour ──────────────────────────────────────────────────────
  # ── Behavior (balanced + production tuned) ─────────────────
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30 # faster reaction
      policies:
        - type: Percent
          value: 100 # can double pods quickly
          periodSeconds: 30
        - type: Pods
          value: 3 # or add max 3 pods
          periodSeconds: 30
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 180 # 3 min cooldown (less waste than 5 min)
      policies:
        - type: Percent
          value: 50 # cut aggressively when idle
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
